<div class="title">
    <div class="type">{{ title }}</div>
    <div class="wrap-name">
        <img class="flag" [src]="'https://flagcdn.com/w40/' + flag + '.png'" [alt]="name" width="28" height="21">
        <div class="name">{{ name }}</div>
    </div>
</div>
<div class="exchange">
    <input
        [value]="value"
        (blur)="onBlurEvent($event)"
        (input)="onInputValueChange($event)"
        type="number">
</div>
